<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام إدارة مبيعات الفروخ</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap');

        :root { 
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --secondary: #64748b;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --info: #0ea5e9;
            --dark: #1e293b;
            --bg-body: #f8fafc;
            --card-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
        }

        body { 
            font-family: 'Cairo', sans-serif; 
            background: var(--bg-body); 
            background-image: radial-gradient(#e2e8f0 1px, transparent 1px);
            background-size: 30px 30px;
            direction: rtl; padding: 20px; margin: 0; color: #334155;
            line-height: 1.6;
        }

        .container { 
            max-width: 1280px; margin: auto; background: rgba(255, 255, 255, 0.9); 
            padding: 40px; border-radius: 32px; box-shadow: var(--card-shadow);
            backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.7);
        }

        h2 { 
            text-align: center; color: var(--dark); font-weight: 900; 
            margin-bottom: 40px; font-size: 2.2rem; position: relative;
        }
        
        h2::after {
            content: ''; display: block; width: 80px; height: 5px; 
            background: var(--primary); margin: 10px auto; border-radius: 10px;
        }

        /* Stats Cards */
        .stats-container {
            display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 40px;
        }

        .stat-card {
            padding: 24px; border-radius: 24px; color: white; position: relative;
            overflow: hidden; transition: transform 0.3s ease; box-shadow: var(--card-shadow);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        
        .stat-card:hover { transform: translateY(-5px); }
        .stat-card svg { width: 32px; height: 32px; margin-bottom: 12px; opacity: 0.9; }
        .stat-card label { font-size: 0.95rem; font-weight: 600; opacity: 0.9; margin-bottom: 5px; }
        .stat-card .value { font-size: 1.7rem; font-weight: 900; }

        .balance-card { background: linear-gradient(135deg, #6366f1, #a855f7); }
        .total-network-card { background: linear-gradient(135deg, #1e293b, #475569); }
        .profit-card { background: linear-gradient(135deg, #10b981, #059669); }
        .net-profit-card { background: linear-gradient(135deg, #f43f5e, #be185d); }

        .exclude-list {
            display: flex; flex-wrap: wrap; gap: 6px; justify-content: center;
            margin-top: 10px; padding: 8px; background: rgba(255,255,255,0.15); 
            border-radius: 12px; max-height: 80px; overflow-y: auto; width: 100%;
        }
        .exclude-item { font-size: 0.7rem; background: rgba(255,255,255,0.2); padding: 2px 8px; border-radius: 6px; }

        /* منطقة الرسم البياني الجديدة */
        .chart-box { 
            background: white; padding: 20px; border-radius: 24px; border: 1px solid #e2e8f0; 
            margin-bottom: 30px; height: 280px; box-shadow: var(--card-shadow);
        }

        /* Form Styling */
        .grid-form { 
            display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); 
            gap: 20px; margin-bottom: 30px; background: #ffffff; padding: 30px;
            border-radius: 24px; border: 1px solid #e2e8f0;
        }

        .f-group { display: flex; flex-direction: column; gap: 8px; }
        .f-group label { font-size: 0.85rem; font-weight: 700; color: var(--secondary); display: flex; align-items: center; gap: 5px; }
        .f-group label svg { width: 16px; height: 16px; color: var(--primary); }

        input, select { 
            padding: 14px 18px; border: 2px solid #f1f5f9; border-radius: 16px; 
            font-size: 0.95rem; transition: all 0.3s; background: #f8fafc; font-family: 'Cairo';
        }
        
        input:focus, select:focus { border-color: var(--primary); background: white; outline: none; box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1); }

        .btn-save { 
            width: 100%; padding: 20px; background: var(--primary);
            color: white; border: none; border-radius: 20px; font-weight: 800; 
            cursor: pointer; font-size: 1.1rem; transition: all 0.3s;
            box-shadow: 0 10px 20px -5px rgba(99, 102, 241, 0.4);
            display: flex; align-items: center; justify-content: center; gap: 12px;
        }
        
        .btn-save:hover { background: var(--primary-dark); transform: translateY(-2px); box-shadow: 0 15px 25px -5px rgba(99, 102, 241, 0.5); }
        .btn-save svg { width: 24px; height: 24px; }
        .btn-save:disabled { background: #cbd5e1; cursor: not-allowed; transform: none; box-shadow: none; }

        /* Table Design */
        .table-wrapper { background: white; border-radius: 24px; overflow: hidden; box-shadow: var(--card-shadow); margin-top: 30px; border: 1px solid #f1f5f9; }
        .scrollable-table { overflow-x: auto; max-height: 600px; }
        
        table { width: 100%; border-collapse: collapse; min-width: 1100px; }
        th { background: #f8fafc; padding: 20px; color: var(--secondary); font-weight: 700; position: sticky; top: 0; z-index: 10; border-bottom: 2px solid #f1f5f9; text-align: center; }
        td { padding: 18px; text-align: center; border-bottom: 1px solid #f1f5f9; font-size: 0.95rem; }
        
        tr:hover { background-color: #fbfcfe; }
        .row-batch { background-color: #f0fdf4 !important; }
        .delay-warning { background-color: #fff1f2 !important; border-right: 6px solid var(--danger); }
        .hidden { display: none !important; }

        /* Action Buttons */
        .btn-action { border: none; width: 40px; height: 40px; border-radius: 12px; cursor: pointer; transition: 0.2s; display: inline-flex; align-items: center; justify-content: center; }
        .btn-edit { background: #eff6ff; color: #2563eb; margin-left: 5px; }
        .btn-del { background: #fef2f2; color: #dc2626; }
        .btn-print { background: #f0fdf4; color: #16a34a; margin-left: 5px; }
        .btn-action svg { width: 20px; height: 20px; }

        /* Export & Filters */
        .filter-section { display: grid; grid-template-columns: 2fr 1fr 1fr; gap: 15px; margin-bottom: 25px; background: #fff; padding: 20px; border-radius: 20px; }
        .export-btns { display: flex; gap: 12px; margin-bottom: 20px; }
        .btn-export { 
            padding: 12px 24px; border-radius: 14px; border: none; cursor: pointer; 
            font-size: 0.9rem; font-weight: 700; display: flex; align-items: center; gap: 10px; transition: 0.3s; color: white;
        }
        .btn-export svg { width: 18px; height: 18px; }

        .copyright { text-align: center; margin-top: 50px; font-size: 0.95rem; color: var(--secondary); font-weight: 600; padding-bottom: 20px; }

        /* Alerts */
        .debt-critical { border: 3px solid var(--danger) !important; animation: pulse-red 2s infinite; }
        @keyframes pulse-red { 0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); } 70% { box-shadow: 0 0 0 15px rgba(239, 68, 68, 0); } 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); } }

        @media (max-width: 1024px) {
            .stats-container { grid-template-columns: 1fr 1fr; }
        }
        @media (max-width: 640px) {
            .stats-container { grid-template-columns: 1fr; }
            .filter-section { grid-template-columns: 1fr; }
            .container { padding: 20px; }
        }
    </style>
</head>
<body>

<div class="container">
    <h2>نظام إدارة مبيعات الفروخ</h2>

    <div class="stats-container">
        <div class="stat-card balance-card" id="mainBalCard">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
            <label>الدين الحالي</label>
            <div class="value" id="displayBal">0</div>
        </div>

        <div class="stat-card total-network-card">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
            <label>إجمالي ديون الشبكة</label>
            <div class="value" id="displayTotalNetwork" style="color: #fbbf24;">0</div>
            <div id="excludeCheckboxes" class="exclude-list"></div>
        </div>

        <div class="stat-card profit-card">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>
            <label>إجمالي المبيعات</label>
            <div class="value" id="displayMonthlyProfit">0</div>
        </div>

        <div class="stat-card net-profit-card">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="7" width="20" height="14" rx="2" ry="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>
            <label>صافي الأرباح</label>
            <div class="value" id="displayNetProfit">0</div>
        </div>
    </div>

    <div class="chart-box">
        <canvas id="salesChart"></canvas>
    </div>

    <div class="grid-form">
        <div class="f-group">
            <label><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg> اسم الموزع</label>
            <input type="text" id="name" list="namesList" placeholder="🔍 ابحث عن موزع..." oninput="fetchUserLastData()">
            <datalist id="namesList"></datalist>
        </div>

        <div class="f-group">
            <label><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/><polyline points="21 16 21 21 16 21"/><line x1="15" y1="15" x2="21" y2="21"/><line x1="4" y1="4" x2="9" y2="9"/></svg> نوع العملية</label>
            <select id="opType" onchange="toggleUI()">
                <option value="طبعة">📦 استلام فروخ</option>
                <option value="دفعة">💰 تسديد دفعة</option>
            </select>
        </div>

        <div class="f-group batch-only">
            <label><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg> نوع الفرخ</label>
            <select id="chickenType">
                <option value="8 ساعات">8 ساعات</option>
                <option value="10 ساعات">10 ساعات</option>
                <option value="24 ساعة">24 ساعة</option>
            </select>
        </div>

        <div class="f-group">
            <label><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg> التاريخ</label>
            <input type="date" id="opDate">
        </div>

        <div class="f-group batch-only">
            <label><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg> رقم الطبعة</label>
            <input type="number" id="batch" value="">
        </div>

        <div class="f-group batch-only">
            <label><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20v-6M6 20V10M18 20V4"/></svg> العدد</label>
            <input type="number" id="qty" oninput="runCalc()" value="" step="0.5">
        </div>

        <div class="f-group batch-only">
            <label><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg> السعر</label>
            <input type="number" id="price" oninput="runCalc()" value="90">
        </div>
        
        <div class="f-group">
            <label><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 17l-5-5 5-5M18 17l-5-5 5-5"/></svg> دين سابق</label>
            <input type="number" id="oldDebt" oninput="runCalc()" value="0" readonly style="background:#f8fafc;">
            <span id="noDebtHint" style="color: var(--danger); font-size: 0.75rem; font-weight: bold; margin-top: 4px; display: none;">⚠️ لا توجد مستحقات</span>
        </div>
        
        <div class="f-group pay-only hidden">
            <label><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg> مدفوع</label>
            <input type="number" id="paid" oninput="runCalc()" value="0">
            <span id="payLimitHint" style="color: var(--danger); font-size: 0.75rem; font-weight: bold; margin-top: 4px; display: none;">⚠️ المبلغ المدفوع أكبر من الدين!</span>
        </div>
        
        <div class="f-group">
            <label><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg> صافي الدين الجديد</label>
            <input type="number" id="remain" readonly style="background:#fff1f2; color:#be123c; font-weight: 900; border-color: #fecaca;">
        </div>

        <div class="f-group" style="grid-column: 1 / -1;">
            <label><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg> ملاحظات إضافية</label>
            <input type="text" id="note" placeholder="اكتب أي ملاحظات هنا...">
        </div>
    </div>

    <button id="submitBtn" class="btn-save" onclick="saveData()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
        حفظ البيانات وإرسال
    </button>
    <button id="cancelEdit" class="hidden" onclick="resetForm()" style="margin-top:10px; width:100%; padding:15px; background:#94a3b8; color:white; border:none; border-radius:12px; cursor:pointer; font-family:'Cairo'; font-weight:bold;">إلغاء التعديل</button>

    <div class="filter-section" style="margin-top: 30px;">
        <div class="f-group">
            <label>🔍 بحث بالاسم:</label>
            <input type="text" id="filterName" list="namesList" placeholder="اسم الموزع..." oninput="refreshUI()">
        </div>
        <div class="f-group">
            <label>📅 من تاريخ:</label>
            <input type="date" id="filterFrom" oninput="refreshUI()">
        </div>
        <div class="f-group">
            <label>📅 إلى تاريخ:</label>
            <input type="date" id="filterTo" oninput="refreshUI()">
        </div>
    </div>

    <div class="export-btns">
        <button class="btn-export" style="background:#10b981;" onclick="exportToExcel()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
            Excel 📊
        </button>
        <button class="btn-export" style="background:#ef4444;" onclick="exportToPDF()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
            تصدير PDF 📄
        </button>
        <button class="btn-export" style="background:#64748b;" onclick="downloadBackup()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            نسخة احتياطية ☁️
        </button>
    </div>

    <div class="table-wrapper">
        <div class="scrollable-table">
            <table>
                <thead>
                    <tr>
                        <th>الموزع</th>
                        <th>التاريخ</th>
                        <th>البيان</th>
                        <th>النوع</th>
                        <th>العدد</th>
                        <th>سابق</th> <th>مدفوع</th>
                        <th>الرصيد</th>
                        <th>ملاحظات</th>
                        <th>إجراءات</th>
                    </tr>
                </thead>
                <tbody id="mainTableBody"></tbody>
            </table>
        </div>
    </div>

    <div class="copyright">
        © جميع الحقوق محفوظة لـ لايف نت لخدمات الانترنت | Live Net
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDm8VXj0nezKEBTgb22IwBFym_pBju_vFk",
        authDomain: "cards-8397e.firebaseapp.com",
        databaseURL: "https://cards-8397e-default-rtdb.firebaseio.com",
        projectId: "cards-8397e",
        storageBucket: "cards-8397e.firebasestorage.app",
        messagingSenderId: "509372121697",
        appId: "1:509372121697:web:a93b9bd262c764f04c2020"
    };

    firebase.initializeApp(firebaseConfig);
    const database = firebase.database().ref('distributors');
    const logsRef = firebase.database().ref('system_logs'); // سجل التعديلات
    let localDB = [];
    let editingId = null;
    let myChart = null;

    document.getElementById('opDate').valueAsDate = new Date();

    database.on('value', snap => {
        const val = snap.val();
        localDB = val ? Object.entries(val).map(([id, data]) => ({id, ...data})) : [];
        refreshUI();
        updateDatalist();
        updateExcludeList();
        calculateNetworkTotal();
        updateChart(); // تحديث الرسم البياني عند كل تغيير
    });

    function toggleUI() {
        const type = document.getElementById('opType').value;
        document.querySelectorAll('.batch-only').forEach(el => el.classList.toggle('hidden', type === 'دفعة'));
        document.querySelectorAll('.pay-only').forEach(el => el.classList.toggle('hidden', type === 'طبعة'));
        runCalc();
    }

    function calculateFinancials(filteredData) {
        let totalSalesValue = 0;   
        let totalProfitEarned = 0; 

        filteredData.forEach(r => {
            if(r.type.includes("طبعة")) {
                const qty = parseFloat(r.qty) || 0;
                const price = parseFloat(r.price) || 0;
                totalSalesValue += qty * price;
            }
            const paid = parseFloat(r.paid) || 0;
            const priceForProfit = parseFloat(r.price) || 90; 
            const cost = 50; 

            if (paid > 0 && priceForProfit > 0) {
                const earnedQty = paid / priceForProfit; 
                totalProfitEarned += earnedQty * (priceForProfit - cost);
            }
        });
        document.getElementById('displayMonthlyProfit').innerText = Math.round(totalSalesValue).toLocaleString() + " ₪";
        document.getElementById('displayNetProfit').innerText = Math.round(totalProfitEarned).toLocaleString() + " ₪";
    }

    // ميزة الرسم البياني الجديدة
    function updateChart() {
        const ctx = document.getElementById('salesChart').getContext('2d');
        const labels = [...new Array(7)].map((_, i) => {
            const d = new Date(); d.setDate(d.getDate() - i);
            return d.toISOString().split('T')[0];
        }).reverse();

        const data = labels.map(date => {
            return localDB.filter(r => r.date === date && r.type.includes("طبعة"))
                          .reduce((sum, r) => sum + (parseFloat(r.qty) * parseFloat(r.price)), 0);
        });

        if(myChart) myChart.destroy();
        myChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: labels,
                datasets: [{ 
                    label: 'إجمالي المبيعات اليومية (₪)', 
                    data: data, 
                    borderColor: '#6366f1', 
                    backgroundColor: 'rgba(99, 102, 241, 0.1)',
                    fill: true, 
                    tension: 0.4,
                    borderWidth: 3
                }]
            },
            options: { 
                responsive: true, 
                maintainAspectRatio: false,
                plugins: { legend: { display: false } },
                scales: { y: { beginAtZero: true } }
            }
        });
    }

    // ميزة طباعة الوصل السريع
    function printReceipt(id) {
        const itm = localDB.find(r => r.id === id);
        const win = window.open('', '', 'width=350,height=500');
        win.document.write(`
            <div dir="rtl" style="font-family:Cairo, sans-serif; text-align:center; padding:20px; border:1px solid #eee;">
                <h2 style="margin-bottom:5px;">لايف نت - Live Net</h2>
                <p style="font-size:12px; margin-top:0;">وصل استلام دفعة مالية</p>
                <hr>
                <p><strong>الموزع:</strong> ${itm.name}</p>
                <p><strong>المبلغ:</strong> <span style="font-size:24px;">${itm.paid} ₪</span></p>
                <p><strong>التاريخ:</strong> ${itm.date}</p>
                <p><strong>الرصيد المتبقي:</strong> ${itm.remain} ₪</p>
                <hr>
                <p style="font-size:10px;">شكراً لتعاملكم معنا</p>
            </div>
        `);
        win.document.close();
        setTimeout(() => { win.print(); win.close(); }, 500);
    }

    function updateExcludeList() {
        const container = document.getElementById('excludeCheckboxes');
        const uniqueNames = [...new Set(localDB.map(r => r.name))];
        const currentChecked = Array.from(container.querySelectorAll('input:checked')).map(i => i.value);
        const isFirstLoad = container.innerHTML === "";
        container.innerHTML = uniqueNames.map(name => {
            const isChecked = isFirstLoad || currentChecked.includes(name);
            return `<label class="exclude-item"><input type="checkbox" value="${name}" ${isChecked ? 'checked' : ''} onchange="calculateNetworkTotal()"> ${name}</label>`;
        }).join('');
    }

    function calculateNetworkTotal() {
        const selectedNames = Array.from(document.querySelectorAll('#excludeCheckboxes input:checked')).map(i => i.value);
        let total = 0;
        selectedNames.forEach(name => {
            const records = localDB.filter(r => r.name === name).sort((a,b) => b.ts - a.ts);
            if (records.length > 0) total += parseFloat(records[0].remain || 0);
        });
        document.getElementById('displayTotalNetwork').innerText = Math.round(total).toLocaleString() + " ₪";
    }

    function exportToExcel() {
        const filter = document.getElementById('filterName').value.trim();
        const from = document.getElementById('filterFrom').value;
        const to = document.getElementById('filterTo').value;
        let data = localDB;
        if(filter) data = data.filter(r => r.name.includes(filter));
        if(from) data = data.filter(r => r.date >= from);
        if(to) data = data.filter(r => r.date <= to);
        const ws = XLSX.utils.json_to_sheet(data.map(r => ({ "الموزع": r.name, "التاريخ": r.date, "البيان": r.type, "العدد": r.qty, "الرصيد": r.remain, "ملاحظات": r.note || "" })));
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Data");
        XLSX.writeFile(wb, `Report_${filter || 'All'}.xlsx`);
    }

    function exportToPDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF('p', 'mm', 'a4');
        const filter = document.getElementById('filterName').value.trim();
        const tableRows = localDB.filter(r => {
            let match = true;
            if(filter && !r.name.includes(filter)) match = false;
            if(document.getElementById('filterFrom').value && r.date < document.getElementById('filterFrom').value) match = false;
            if(document.getElementById('filterTo').value && r.date > document.getElementById('filterTo').value) match = false;
            return match;
        }).sort((a,b) => b.ts - a.ts).map(r => [r.name, r.date, r.type, r.qty || 0, r.old, r.paid, r.remain + " ₪", r.note || ""]);
        doc.autoTable({
            startY: 30,
            head: [['الموزع', 'التاريخ', 'البيان', 'العدد', 'سابق', 'مدفوع', 'الرصيد', 'ملاحظات']],
            body: tableRows,
            styles: { fontSize: 8, halign: 'right' },
            headStyles: { fillColor: [67, 56, 202], textColor: 255, halign: 'center' }
        });
        doc.save("Report.pdf");
    }

    function downloadBackup() {
        const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(localDB));
        const downloadAnchorNode = document.createElement('a');
        downloadAnchorNode.setAttribute("href", dataStr);
        downloadAnchorNode.setAttribute("download", "backup_" + new Date().toLocaleDateString() + ".json");
        document.body.appendChild(downloadAnchorNode);
        downloadAnchorNode.click();
        downloadAnchorNode.remove();
    }

    function fetchUserLastData() {
        if (editingId) return; 
        const name = document.getElementById('name').value.trim();
        const records = localDB.filter(r => r.name === name).sort((a,b) => b.ts - a.ts);
        const lastBal = records.length > 0 ? parseFloat(records[0].remain) : 0;
        const card = document.getElementById('mainBalCard');
        if (lastBal >= 5000) card.classList.add('debt-critical');
        else card.classList.remove('debt-critical');
        document.getElementById('oldDebt').value = Math.round(lastBal);
        document.getElementById('displayBal').innerText = Math.round(lastBal).toLocaleString();
        runCalc();
    }

    function runCalc() {
        const type = document.getElementById('opType').value;
        const q = parseFloat(document.getElementById('qty').value) || 0;
        const p = parseFloat(document.getElementById('price').value) || 0;
        const old = parseFloat(document.getElementById('oldDebt').value) || 0;
        const paid = parseFloat(document.getElementById('paid').value) || 0;
        const currentTotal = (q * p) + old;
        const result = currentTotal - paid;
        document.getElementById('remain').value = Math.round(result);
        const subBtn = document.getElementById('submitBtn');
        const payLimitHint = document.getElementById('payLimitHint');
        const noDebtHint = document.getElementById('noDebtHint');
        if (type === 'دفعة') {
            if (old <= 0) { noDebtHint.style.display = 'block'; payLimitHint.style.display = 'none'; subBtn.disabled = true; }
            else if (paid > old) { payLimitHint.style.display = 'block'; noDebtHint.style.display = 'none'; subBtn.disabled = true; }
            else { noDebtHint.style.display = 'none'; payLimitHint.style.display = 'none'; subBtn.disabled = false; }
        } else { noDebtHint.style.display = 'none'; payLimitHint.style.display = 'none'; subBtn.disabled = false; }
    }

    function saveData() {
        const subBtn = document.getElementById('submitBtn');
        if(subBtn.disabled) return;
        const name = document.getElementById('name').value.trim();
        if (!name) return alert("الاسم مطلوب!");
        const data = {
            name: name,
            type: document.getElementById('opType').value === "طبعة" ? `طبعة (${document.getElementById('batch').value})` : "دفعة مالية",
            chickenType: document.getElementById('chickenType').value,
            date: document.getElementById('opDate').value,
            batch: document.getElementById('batch').value || 0,
            qty: document.getElementById('qty').value,
            price: document.getElementById('price').value,
            old: Math.round(document.getElementById('oldDebt').value),
            paid: Math.round(document.getElementById('paid').value),
            remain: Math.round(document.getElementById('remain').value),
            note: document.getElementById('note').value,
            ts: Date.now()
        };
        if (editingId) {
            database.child(editingId).update(data).then(() => {
                logsRef.push({ action: "تعديل", details: data }); // تسجيل التعديل
                resetForm();
            });
        } else {
            database.push(data).then(() => {
                logsRef.push({ action: "إضافة", details: data }); // تسجيل الإضافة
                resetForm();
            });
        }
        alert("تم الحفظ بنجاح ✅");
    }

    function resetForm() {
        editingId = null;
        document.getElementById('submitBtn').innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg> حفظ البيانات وإرسال`;
        document.getElementById('cancelEdit').classList.add('hidden');
        document.querySelectorAll('.grid-form input:not([type=date])').forEach(i => i.value = (i.id === 'price' ? 90 : 0));
        document.getElementById('name').value = "";
        document.getElementById('note').value = "";
        document.getElementById('mainBalCard').classList.remove('debt-critical');
    }

    function editItem(id) {
        const itm = localDB.find(r => r.id === id);
        editingId = id;
        document.getElementById('name').value = itm.name;
        document.getElementById('opDate').value = itm.date;
        document.getElementById('qty').value = itm.qty;
        document.getElementById('price').value = itm.price;
        document.getElementById('paid').value = itm.paid;
        document.getElementById('oldDebt').value = itm.old;
        document.getElementById('note').value = itm.note || "";
        document.getElementById('submitBtn').innerText = "🆙 تحديث البيانات";
        document.getElementById('cancelEdit').classList.remove('hidden');
        toggleUI();
        window.scrollTo({top: 0, behavior: 'smooth'});
    }

    function deleteItem(id) { 
        if (confirm("هل أنت متأكد من الحذف؟")) {
            logsRef.push({ action: "حذف", id: id }); // تسجيل الحذف
            database.child(id).remove(); 
        } 
    }

    function updateDatalist() {
        const list = document.getElementById('namesList');
        const names = [...new Set(localDB.map(r => r.name))];
        list.innerHTML = names.map(n => `<option value="${n}">`).join('');
    }

    function refreshUI() {
        const tbody = document.getElementById('mainTableBody');
        tbody.innerHTML = '';
        const filter = document.getElementById('filterName').value.trim();
        const from = document.getElementById('filterFrom').value;
        const to = document.getElementById('filterTo').value;
        const now = Date.now();
        let filteredData = localDB.filter(r => {
            let match = true;
            if(filter && !r.name.includes(filter)) match = false;
            if(from && r.date < from) match = false;
            if(to && r.date > to) match = false;
            return match;
        });
        calculateFinancials(filteredData);
        filteredData.sort((a,b) => b.ts - a.ts).forEach(item => {
            const isBatch = item.type.includes("طبعة");
            const isDelayed = (item.remain > 0 && (now - item.ts > 7*24*60*60*1000));
            tbody.innerHTML += `
                <tr class="${isBatch ? 'row-batch' : ''} ${isDelayed ? 'delay-warning' : ''}">
                    <td style="font-weight:bold">${item.name} ${isDelayed ? '⚠️' : ''}</td>
                    <td>${item.date}</td>
                    <td><span style="background:${isBatch?'#dcfce7':'#fef3c7'}; color:${isBatch?'#166534':'#92400e'}; padding:4px 10px; border-radius:8px; font-size:0.8rem; font-weight:bold;">${item.type}</span></td>
                    <td style="font-weight:bold; color:var(--primary);">${isBatch ? item.chickenType : '-'}</td>
                    <td>${item.qty}</td>
                    <td>${item.old}</td> <td>${item.paid}</td>
                    <td style="color:var(--danger); font-weight:900;">${item.remain}</td>
                    <td style="font-size:0.8rem; color:var(--secondary); max-width:150px;">${item.note || '-'}</td>
                    <td>
                        <button class="btn-action btn-edit" onclick="editItem('${item.id}')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></button>
                        ${!isBatch && item.paid > 0 ? `<button class="btn-action btn-print" onclick="printReceipt('${item.id}')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg></button>` : ''}
                        <button class="btn-action btn-del" onclick="deleteItem('${item.id}')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg></button>
                    </td>
                </tr>`;
        });
    }
</script>
